services:
  migration:
    build:
      context: .
      dockerfile: Dockerfile
    command: ./entrypoint.sh migrate
    profiles: ["manual"]
    env_file:
      - '.env'
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: ./entrypoint.sh api
    container_name: internal-mobility-matching-api
    tty: true
    stdin_open: true
    ports:
      - "${APP_PORT:-4004}:${APP_PORT:-4004}"
    env_file:
      - '.env'
    depends_on:
      - redis
    volumes:
      - ./:/code
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ./entrypoint.sh worker
    container_name: internal-mobility-matching-worker
    env_file:
      - '.env'
    depends_on:
      - redis
    volumes:
      - ./:/code
  redis:
    image: "redis:alpine"
