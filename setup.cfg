[flake8]
exclude = .git,venv
; E401 is 'multiple imports on one line' -- no big deal?
; W503 is 'line break before binary operator' -- preferred
ignore = E401,W503
max-line-length = 120
max-complexity = 15
require-code = True
require-used = True
min-version = 3.6.8
per-file-ignores = __init__.py:F401

[isort]
balanced_wrapping = False
indent = 4
lines_after_imports = 2
line_length = 120
multi_line_output = 5
skip = venv
src_paths = app,tests

[coverage:run]
branch = True
data_file = .coverage
parallel = True
omit =
  */tests/*
  venv/*

[coverage:report]
show_missing = True
skip_covered = true
